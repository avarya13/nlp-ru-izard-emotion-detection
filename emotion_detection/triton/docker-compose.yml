version: "3.9"

services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.12-py3

    command:
      - tritonserver
      - --model-repository=/models

    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"

    volumes:
      - ./model_repository:/models

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
